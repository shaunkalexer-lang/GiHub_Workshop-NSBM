name: Code Scan — Semgrep

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    # Only run on PRs from forks or direct pushes — skip Dependabot
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep — secrets detection
        run: |
          semgrep ci \
            --config "p/secrets" \
            --config "p/python" \
            --config "p/security-audit" \
            --sarif \
            --output semgrep-results.sarif
        env:
          # No SEMGREP_APP_TOKEN needed for open source rulesets
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Fail if secrets or critical issues found
        run: |
          semgrep ci \
            --config "p/secrets" \
            --config "p/python" \
            --config "p/security-audit" \
            --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
